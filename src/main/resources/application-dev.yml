spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/cloud_storage_db
    username: postgres
    password: admin
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10

  session:
    store-type: redis
    timeout: 24h
    redis:
      namespace: spring:session
      flush-mode: on-save

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin123
  bucket-name: user-files

logging:
  level:
    root: INFO
    com.example.cloud_storage: DEBUG
    org.springframework.security: DEBUG
    org.springframework.session: DEBUG
    org.springframework.data.redis: DEBUG

server:
  servlet:
    session:
      cookie:
        secure: false   # для локального HTTP